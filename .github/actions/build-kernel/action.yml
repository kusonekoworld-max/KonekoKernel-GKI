name: 'Build Kernel'
description: 'Builds kernel using legacy build.sh or Bazel (kleaf)'
inputs:
  bypass:
    description: 'Whether to add the bypass hack or not'
    required: true
  version:
    description: 'Kernel config version (e.g., android14-6.1)'
    required: true

runs:
  using: composite
  steps:
  - name: 'Activate Bypass'
    shell: bash
    working-directory: ${{ github.workspace }}/kernel
    run: |
      set -euo pipefail
      if [ "${{ inputs.bypass }}" = "true" ]; then
        if [[ ${{ inputs.version }} == "android14-6.1" || ${{ inputs.version }} == "android15-6.6" || ${{ inputs.version }} == "android16-6.12" ]]; then
          TARGET_FILE="${{ github.workspace }}/kernel/common/kernel/module/version.c"
        else
          TARGET_FILE="${{ github.workspace }}/kernel/common/kernel/module.c"
        fi

        sed -i '/bad_version:/{:a;n;/return 0;/{s/return 0;/return 1;/;b};ba}' "$TARGET_FILE"

        if ! grep -A 5 "bad_version:" "$TARGET_FILE" | grep -q "return 1;"; then
          echo "Patch failed! 'return 1;' not found at bad_version:"
          grep -A 10 "bad_version:" "$TARGET_FILE" || true
          exit 1
        fi
      else
        echo "Bypass hack not applied as per input parameter."
      fi

  - name: Setup Kernel Configs
    if: false
    uses: ./.github/actions/set-kernel-config

  - name: 'Inject MomenToMoiX Driver'
    shell: bash
    run: |
      set -euo pipefail
      TARGET_DIR="$GITHUB_WORKSPACE/kernel/common"
      mkdir -p "$TARGET_DIR/drivers/momx"
      cd "${{ github.action_path }}/patches/tenebrion"
      cp MomenToMoiX.c "$TARGET_DIR/drivers/momx/MomenToMoiX.c"
      cp Makefile "$TARGET_DIR/drivers/momx/Makefile"
      cp selinux.sh "$TARGET_DIR/drivers/momx/Sekinux.sh"
      if ! grep -q "momx/" "$TARGET_DIR/drivers/Makefile"; then
        echo "obj-y += momx/" >> "$TARGET_DIR/drivers/Makefile"
      fi

  - name: 'Inject MomenToMoiX SELinux Rules'
    shell: bash
    working-directory: ${{ github.workspace }}/kernel/common
    run: |
      set -euo pipefail
      SELINUX_PATCH_PATH="${{ github.action_path }}/patches/tenebrion/selinux.sh"
      cp "$SELINUX_PATCH_PATH" ./selinux.sh
      chmod +x ./selinux.sh
      RULES_FILE=$(find -L drivers/kernelsu -type f -name "rules.c" 2>/dev/null | head -1)
      if [[ -z "$RULES_FILE" ]]; then
        RULES_FILE=$(grep -rl "ksu_allow" . --include="rules.c" 2>/dev/null | head -1)
      fi
      if [[ -z "$RULES_FILE" ]]; then
        exit 1
      fi
      export SELINUX_RULES_C="$RULES_FILE"
      ./selinux.sh

  - name: 'Inject Reflex Governor'
    shell: bash
    run: |
      set -euo pipefail
      TARGET_DIR="$GITHUB_WORKSPACE/kernel/common"

      mkdir -p "$TARGET_DIR/kernel/sched"
      cp "${{ github.action_path }}/patches/reflex/cpufreq_reflex.c" "$TARGET_DIR/kernel/sched/cpufreq_reflex.c"

      if ! grep -q "cpufreq_reflex.o" "$TARGET_DIR/kernel/sched/Makefile"; then
        echo 'obj-$(CONFIG_CPU_FREQ_GOV_REFLEX) += cpufreq_reflex.o' >> "$TARGET_DIR/kernel/sched/Makefile"
      fi

      if ! grep -q "config CPU_FREQ_GOV_REFLEX" "$TARGET_DIR/drivers/cpufreq/Kconfig"; then
        printf "\nconfig CPU_FREQ_GOV_REFLEX\n" >> "$TARGET_DIR/drivers/cpufreq/Kconfig"
        printf "\ttristate \"'reflex' cpufreq governor\"\n" >> "$TARGET_DIR/drivers/cpufreq/Kconfig"
        printf "\tdepends on CPU_FREQ && SMP\n" >> "$TARGET_DIR/drivers/cpufreq/Kconfig"
        printf "\tselect CPU_FREQ_GOV_ATTR_SET\n" >> "$TARGET_DIR/drivers/cpufreq/Kconfig"
        printf "\thelp\n" >> "$TARGET_DIR/drivers/cpufreq/Kconfig"
        printf "\t  'reflex' is an advanced CPU frequency governor based on schedutil,\n" >> "$TARGET_DIR/drivers/cpufreq/Kconfig"
        printf "\t  featuring idle-time accounting and PELT-complementary exponential decay.\n" >> "$TARGET_DIR/drivers/cpufreq/Kconfig"
      fi

      DEFCONFIG_GKI="$TARGET_DIR/arch/arm64/configs/gki_defconfig"
      if [ -f "$DEFCONFIG_GKI" ]; then
        if ! grep -q "CONFIG_CPU_FREQ_GOV_REFLEX" "$DEFCONFIG_GKI"; then
          echo "CONFIG_CPU_FREQ_GOV_REFLEX=y" >> "$DEFCONFIG_GKI"
        fi
      fi

  - name: 'Inject Zenith & Hikari Governor'
    shell: bash
    run: |
      set -euo pipefail
      TARGET_DIR="$GITHUB_WORKSPACE/kernel/common"

      mkdir -p "$TARGET_DIR/kernel/sched"
      mkdir -p "$TARGET_DIR/include/linux"
      mkdir -p "$TARGET_DIR/include/trace/events"

      cp "${{ github.action_path }}/patches/zenith/cpufreq_zenith.c" "$TARGET_DIR/kernel/sched/cpufreq_zenith.c"
      cp "${{ github.action_path }}/patches/zenith/hikari.c" "$TARGET_DIR/kernel/sched/hikari.c"

      # 5.15-based GKI trees predate upstream's uclamp_rq_get()/set()
      # wrapper pair in kernel/sched/sched.h, so the direct call in
      # zenith_uclamp_cache_refresh() fails with an implicit-declaration
      # error. Inject a portable compat shim (same plain
      # rq->uclamp[clamp_id].value read the real helper does) right
      # after the includes, once, idempotently. Placement just needs
      # to precede first use, not be adjacent to it.
      ZENITH_C="$TARGET_DIR/kernel/sched/cpufreq_zenith.c"
      if ! grep -q "zenith_uclamp_rq_get" "$ZENITH_C"; then
        cat > /tmp/zenith_uclamp_shim.txt <<'EOF'

/*
 * Compat shim: this base kernel tree (5.15) predates upstream's
 * uclamp_rq_get()/uclamp_rq_set() wrapper pair in kernel/sched/sched.h.
 * Falls back to the same plain field read the real helper does, so
 * behavior is identical either way.
 */
#ifdef CONFIG_UCLAMP_TASK
#ifndef uclamp_rq_get
static inline unsigned long zenith_uclamp_rq_get(struct rq *rq,
						  enum uclamp_id clamp_id)
{
	return READ_ONCE(rq->uclamp[clamp_id].value);
}
#define uclamp_rq_get(rq, clamp_id) zenith_uclamp_rq_get((rq), (clamp_id))
#endif
#endif
EOF
        sed -i '/^#include <linux\/hikari\.h>/r /tmp/zenith_uclamp_shim.txt' "$ZENITH_C"
      fi

      cp "${{ github.action_path }}/patches/zenith/cpufreq_zenith.h" "$TARGET_DIR/include/linux/cpufreq_zenith.h"
      cp "${{ github.action_path }}/patches/zenith/hikari.h" "$TARGET_DIR/include/linux/hikari.h"
      cp "${{ github.action_path }}/patches/zenith/zenith_profiles.h" "$TARGET_DIR/include/linux/zenith_profiles.h"

      cp "${{ github.action_path }}/patches/zenith/trace_cpufreq_zenith.h" "$TARGET_DIR/include/trace/events/cpufreq_zenith.h"
      cp "${{ github.action_path }}/patches/zenith/trace_hikari.h" "$TARGET_DIR/include/trace/events/hikari.h"

      if ! grep -q "cpufreq_zenith.o" "$TARGET_DIR/kernel/sched/Makefile"; then
        echo 'obj-$(CONFIG_CPU_FREQ_GOV_ZENITH) += cpufreq_zenith.o' >> "$TARGET_DIR/kernel/sched/Makefile"
      fi
      if ! grep -q "hikari.o" "$TARGET_DIR/kernel/sched/Makefile"; then
        echo 'obj-$(CONFIG_CPU_FREQ_GOV_ZENITH) += hikari.o' >> "$TARGET_DIR/kernel/sched/Makefile"
      fi

      if ! grep -q "config CPU_FREQ_GOV_ZENITH" "$TARGET_DIR/drivers/cpufreq/Kconfig"; then
        printf "\nconfig CPU_FREQ_GOV_ZENITH\n" >> "$TARGET_DIR/drivers/cpufreq/Kconfig"
        printf "\ttristate \"'zenith' and 'hikari' cpufreq governor\"\n" >> "$TARGET_DIR/drivers/cpufreq/Kconfig"
        printf "\tdepends on CPU_FREQ && SMP\n" >> "$TARGET_DIR/drivers/cpufreq/Kconfig"
        printf "\tselect CPU_FREQ_GOV_ATTR_SET\n" >> "$TARGET_DIR/drivers/cpufreq/Kconfig"
        printf "\thelp\n" >> "$TARGET_DIR/drivers/cpufreq/Kconfig"
        printf "\t  'zenith' and 'hikari' are advanced custom CPU frequency governors\n" >> "$TARGET_DIR/drivers/cpufreq/Kconfig"
        printf "\t  designed for optimized performance and energy awareness.\n" >> "$TARGET_DIR/drivers/cpufreq/Kconfig"
      fi

      # hikari.c compiles its real hikari_enabled()/hikari_uclamp_*()
      # definitions unconditionally, but include/linux/hikari.h only
      # exposes those declarations (instead of its stub inlines) when
      # CONFIG_HIKARI is set. Nothing previously defined that symbol,
      # so the header fell back to its stubs and collided with the
      # real definitions at link/compile time. Define it here, tied
      # to the governor that actually gates hikari.o in the Makefile.
      if ! grep -q "config HIKARI" "$TARGET_DIR/drivers/cpufreq/Kconfig"; then
        printf "\nconfig HIKARI\n" >> "$TARGET_DIR/drivers/cpufreq/Kconfig"
        printf "\tbool \"Hikari wake-time policy engine\"\n" >> "$TARGET_DIR/drivers/cpufreq/Kconfig"
        printf "\tdepends on CPU_FREQ_GOV_ZENITH\n" >> "$TARGET_DIR/drivers/cpufreq/Kconfig"
        printf "\tdefault y\n" >> "$TARGET_DIR/drivers/cpufreq/Kconfig"
        printf "\thelp\n" >> "$TARGET_DIR/drivers/cpufreq/Kconfig"
        printf "\t  Enables the Hikari wake-time policy engine consumed by\n" >> "$TARGET_DIR/drivers/cpufreq/Kconfig"
        printf "\t  the 'zenith' cpufreq governor.\n" >> "$TARGET_DIR/drivers/cpufreq/Kconfig"
      fi

      # Gates hikari_uclamp_boost_amount() / hikari_apply_uclamp_boost():
      # the per-task uclamp_min wake-time boost actuator. Without this,
      # IS_ENABLED(CONFIG_HIKARI_UCLAMP) is always false and the boost
      # path silently compiles out even though hikari_boost_until_ns
      # and the uclamp_ttl_ms/uclamp_max_pct sysctls are present.
      if ! grep -q "config HIKARI_UCLAMP" "$TARGET_DIR/drivers/cpufreq/Kconfig"; then
        printf "\nconfig HIKARI_UCLAMP\n" >> "$TARGET_DIR/drivers/cpufreq/Kconfig"
        printf "\tbool \"Hikari uclamp_min wake-time boost\"\n" >> "$TARGET_DIR/drivers/cpufreq/Kconfig"
        printf "\tdepends on HIKARI\n" >> "$TARGET_DIR/drivers/cpufreq/Kconfig"
        printf "\tdefault y\n" >> "$TARGET_DIR/drivers/cpufreq/Kconfig"
        printf "\thelp\n" >> "$TARGET_DIR/drivers/cpufreq/Kconfig"
        printf "\t  Enables Hikari's time-limited per-task uclamp_min boost\n" >> "$TARGET_DIR/drivers/cpufreq/Kconfig"
        printf "\t  on wake-up, tuned via hikari_uclamp_ttl_ms/hikari_uclamp_max_pct.\n" >> "$TARGET_DIR/drivers/cpufreq/Kconfig"
      fi

      DEFCONFIG_GKI="$TARGET_DIR/arch/arm64/configs/gki_defconfig"
      if [ -f "$DEFCONFIG_GKI" ]; then
        if ! grep -q "CONFIG_CPU_FREQ_GOV_ZENITH" "$DEFCONFIG_GKI"; then
          echo "CONFIG_CPU_FREQ_GOV_ZENITH=y" >> "$DEFCONFIG_GKI"
        fi
        if ! grep -q "CONFIG_HIKARI=" "$DEFCONFIG_GKI"; then
          echo "CONFIG_HIKARI=y" >> "$DEFCONFIG_GKI"
        fi
        if ! grep -q "CONFIG_HIKARI_UCLAMP" "$DEFCONFIG_GKI"; then
          echo "CONFIG_HIKARI_UCLAMP=y" >> "$DEFCONFIG_GKI"
        fi
      fi

  - name: 'Inject Hikari Flags'
    shell: bash
    working-directory: ${{ github.workspace }}/kernel/common
    run: |
      set -euo pipefail
      SCHED_H="include/linux/sched.h"

      echo "Checking for hikari_flags in sched.h"
      if ! grep -q "hikari_flags;" "$SCHED_H"; then
        echo "Injecting hikari_flags"
        sed -i '/struct thread_struct[[:space:]]*thread;/a \
        \tu32 hikari_flags;' "$SCHED_H"
        echo "Injection successful"
      else
        echo "hikari_flags already present"
      fi

      echo "Checking for hikari_boost_until_ns in sched.h"
      if ! grep -q "hikari_boost_until_ns;" "$SCHED_H"; then
        echo "Injecting hikari_boost_until_ns"
        sed -i '/struct thread_struct[[:space:]]*thread;/a \
        \tu32 hikari_boost_until_ns;' "$SCHED_H"
        echo "Injection successful"
      else
        echo "hikari_boost_until_ns already present"
      fi

      echo "Checking for hikari_last_enqueue_ns in sched.h"
      if ! grep -q "hikari_last_enqueue_ns;" "$SCHED_H"; then
        echo "Injecting hikari_last_enqueue_ns"
        sed -i '/struct thread_struct[[:space:]]*thread;/a \
        \tu32 hikari_last_enqueue_ns;' "$SCHED_H"
        echo "Injection successful"
      else
        echo "hikari_last_enqueue_ns already present"
      fi

      echo "Checking for hikari_wait_ewma_ns in sched.h"
      if ! grep -q "hikari_wait_ewma_ns;" "$SCHED_H"; then
        echo "Injecting hikari_wait_ewma_ns"
        sed -i '/struct thread_struct[[:space:]]*thread;/a \
        \tu32 hikari_wait_ewma_ns;' "$SCHED_H"
        echo "Injection successful"
      else
        echo "hikari_wait_ewma_ns already present"
      fi

  - name: 'Build Kernel'
    shell: bash
    working-directory: ${{ github.workspace }}/kernel
    run: |
      sed -i 's/check_defconfig//' ./common/build.config.gki
      if [ -f "build/build.sh" ]; then
        BUILD_GKI_ARTIFACTS= \
        BUILD_GKI_CERTIFICATION_TOOLS=0 \
        BUILD_SYSTEM_DLKM=0 \
        SKIP_VENDOR_BOOT=1 \
        SKIP_EXT_MODULES=1 \
        SKIP_CP_KERNEL_HDR=1 \
        OUT_DIR="/home/runner/out" \
        LTO=thin \
        BUILD_CONFIG=common/build.config.gki.aarch64 \
        build/build.sh -j"$(nproc)" \
        CC="/usr/bin/ccache clang" \
        CXX="/usr/bin/ccache clang+" \
        HOSTCC="/usr/bin/ccache clang" \
        HOSTCXX="/usr/bin/ccache clang+" \
        LD="${{ github.workspace }}/kernel/common/ld-wrapper" \
        HOSTLD="${{ github.workspace }}/kernel/common/ld-wrapper"
      else
        if [[ ${{ inputs.version }} == "android16-6.12" ]]; then
          if [ "${{ inputs.bypass }}" = "false" ]; then
            sed -i '/name = "kernel_aarch64",/a\    check_defconfig = "disabled",' common/BUILD.bazel
          fi
          tools/bazel run \
            --config=fast \
            --config=stamp \
            --disk_cache=/home/runner/.cache/bazel \
            //common:kernel_aarch64_dist \
            -- --destdir=/home/runner/out
        else
          tools/bazel run \
            --config=fast \
            --config=stamp \
            --disk_cache=/home/runner/.cache/bazel \
            //common:kernel_aarch64_dist \
            -- --dist_dir=/home/runner/out
        fi
      fi

  - name: 'Gather Build Artifacts'
    shell: bash
    working-directory: ${{ github.workspace }}
    run: |
      set -euo pipefail
      if [ -f "/home/runner/out/dist/Image" ]; then
        if [[ ${{ inputs.bypass }} == "true" ]]; then
          cp "/home/runner/out/dist/Image" "${{ github.workspace }}/AnyKernel3/Bypass-Image"
        else
          cp "/home/runner/out/dist/Image" "${{ github.workspace }}/AnyKernel3/Image"
        fi
        exit 0
      fi
      if [ -f "/home/runner/out/Image" ]; then
        if [[ ${{ inputs.bypass }} == "true" ]]; then
          cp "/home/runner/out/Image" "${{ github.workspace }}/AnyKernel3/Bypass-Image"
        else
          cp "/home/runner/out/Image" "${{ github.workspace }}/AnyKernel3/Image"
        fi
        exit 0
      fi
      exit 1

  - name: 'Patch AnyKernel3 for Bypass Hack'
    shell: bash
    if: ${{ inputs.bypass == 'true' }}
    working-directory: ${{ github.workspace }}/AnyKernel3
    run: |
      set -euo pipefail
      cp ${{ github.action_path }}/patches/bypass.patch "${{ github.workspace }}/AnyKernel3/bypass.patch"
      patch -p1 < bypass.patch
