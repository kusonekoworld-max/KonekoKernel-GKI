name: 'Build Kernel'
description: 'Builds kernel using legacy build.sh or Bazel (kleaf)'
inputs:
  bypass:
    description: 'Whether to add the bypass hack or not'
    required: true
  version:
    description: 'Kernel config version (e.g., android14-6.1)'
    required: true

runs:
  using: composite
  steps:
  - name: 'Activate Bypass'
    shell: bash
    working-directory: ${{ github.workspace }}/kernel
    run: |
      set -euo pipefail
      if [ "${{ inputs.bypass }}" = "true" ]; then
        if [[ ${{ inputs.version }} == "android14-6.1" || ${{ inputs.version }} == "android15-6.6" || ${{ inputs.version }} == "android16-6.12" ]]; then
          TARGET_FILE="${{ github.workspace }}/kernel/common/kernel/module/version.c"
        else
          TARGET_FILE="${{ github.workspace }}/kernel/common/kernel/module.c"
        fi

        sed -i '/bad_version:/{:a;n;/return 0;/{s/return 0;/return 1;/;b};ba}' "$TARGET_FILE"

        if ! grep -A 5 "bad_version:" "$TARGET_FILE" | grep -q "return 1;"; then
          echo "Patch failed! 'return 1;' not found at bad_version:"
          grep -A 10 "bad_version:" "$TARGET_FILE" || true
          exit 1
        fi
      else
        echo "Bypass hack not applied as per input parameter."
      fi

  - name: Setup Kernel Configs
    if: false
    uses: ./.github/actions/set-kernel-config

  - name: 'Inject MomenToMoiX Driver'
    shell: bash
    run: |
      set -euo pipefail
      TARGET_DIR="$GITHUB_WORKSPACE/kernel/common"
      mkdir -p "$TARGET_DIR/drivers/momx"
      cd "${{ github.action_path }}/patches/tenebrion"
      cp MomenToMoiX.c "$TARGET_DIR/drivers/momx/MomenToMoiX.c"
      cp Makefile "$TARGET_DIR/drivers/momx/Makefile"
      cp selinux.sh "$TARGET_DIR/drivers/momx/Sekinux.sh"
      if ! grep -q "momx/" "$TARGET_DIR/drivers/Makefile"; then
        echo "obj-y += momx/" >> "$TARGET_DIR/drivers/Makefile"
      fi

  - name: 'Inject MomenToMoiX SELinux Rules'
    shell: bash
    working-directory: ${{ github.workspace }}/kernel/common
    run: |
      set -euo pipefail
      SELINUX_PATCH_PATH="${{ github.action_path }}/patches/tenebrion/selinux.sh"
      cp "$SELINUX_PATCH_PATH" ./selinux.sh
      chmod +x ./selinux.sh
      RULES_FILE=$(find -L drivers/kernelsu -type f -name "rules.c" 2>/dev/null | head -1)
      if [[ -z "$RULES_FILE" ]]; then
        RULES_FILE=$(grep -rl "ksu_allow" . --include="rules.c" 2>/dev/null | head -1)
      fi
      if [[ -z "$RULES_FILE" ]]; then
        exit 1
      fi
      export SELINUX_RULES_C="$RULES_FILE"
      ./selinux.sh

  - name: 'Inject Reflex Governor'
    shell: bash
    run: |
      set -euo pipefail
      TARGET_DIR="$GITHUB_WORKSPACE/kernel/common"

      mkdir -p "$TARGET_DIR/kernel/sched"
      cp "${{ github.action_path }}/patches/reflex/cpufreq_reflex.c" "$TARGET_DIR/kernel/sched/cpufreq_reflex.c"

      if ! grep -q "cpufreq_reflex.o" "$TARGET_DIR/kernel/sched/Makefile"; then
        echo 'obj-$(CONFIG_CPU_FREQ_GOV_REFLEX) += cpufreq_reflex.o' >> "$TARGET_DIR/kernel/sched/Makefile"
      fi

      if ! grep -q "config CPU_FREQ_GOV_REFLEX" "$TARGET_DIR/drivers/cpufreq/Kconfig"; then
        printf "\nconfig CPU_FREQ_GOV_REFLEX\n" >> "$TARGET_DIR/drivers/cpufreq/Kconfig"
        printf "\ttristate \"'reflex' cpufreq governor\"\n" >> "$TARGET_DIR/drivers/cpufreq/Kconfig"
        printf "\tdepends on CPU_FREQ && SMP\n" >> "$TARGET_DIR/drivers/cpufreq/Kconfig"
        printf "\tselect CPU_FREQ_GOV_ATTR_SET\n" >> "$TARGET_DIR/drivers/cpufreq/Kconfig"
        printf "\thelp\n" >> "$TARGET_DIR/drivers/cpufreq/Kconfig"
        printf "\t  'reflex' is an advanced CPU frequency governor based on schedutil,\n" >> "$TARGET_DIR/drivers/cpufreq/Kconfig"
        printf "\t  featuring idle-time accounting and PELT-complementary exponential decay.\n" >> "$TARGET_DIR/drivers/cpufreq/Kconfig"
      fi

      DEFCONFIG_GKI="$TARGET_DIR/arch/arm64/configs/gki_defconfig"
      if [ -f "$DEFCONFIG_GKI" ]; then
        if ! grep -q "CONFIG_CPU_FREQ_GOV_REFLEX" "$DEFCONFIG_GKI"; then
          echo "CONFIG_CPU_FREQ_GOV_REFLEX=y" >> "$DEFCONFIG_GKI"
        fi
      fi

  - name: 'Inject Vorpal Governor + GKI510 Compat'
    shell: bash
    run: |
      set -euo pipefail
      TARGET_DIR="$GITHUB_WORKSPACE/kernel/common"

      mkdir -p "$TARGET_DIR/kernel/sched"
      cp "${{ github.action_path }}/patches/vorpal/cpufreq_vorpal.c" "$TARGET_DIR/kernel/sched/cpufreq_vorpal.c"
      cp "${{ github.action_path }}/patches/vorpal/rfx_gki510_compat.c" "$TARGET_DIR/kernel/sched/rfx_gki510_compat.c"

      if ! grep -q "cpufreq_vorpal.o" "$TARGET_DIR/kernel/sched/Makefile"; then
        echo 'obj-$(CONFIG_CPU_FREQ_GOV_VORPAL) += cpufreq_vorpal.o' >> "$TARGET_DIR/kernel/sched/Makefile"
      fi

      # rfx_gki510_compat.o must ALWAYS be built (obj-y), not gated
      # behind CONFIG_CPU_FREQ_GOV_VORPAL. It defines sched_gaming_active,
      # which kernel/sched/fair.c references unconditionally (see the
      # fair.c patch step below) since fair.c is core scheduler code
      # that's always compiled regardless of which cpufreq governor is
      # selected. Gating this file behind the governor's Kconfig would
      # make fair.c fail to link whenever Vorpal is disabled.
      if ! grep -q "rfx_gki510_compat.o" "$TARGET_DIR/kernel/sched/Makefile"; then
        echo 'obj-y += rfx_gki510_compat.o' >> "$TARGET_DIR/kernel/sched/Makefile"
      fi

      if ! grep -q "config CPU_FREQ_GOV_VORPAL" "$TARGET_DIR/drivers/cpufreq/Kconfig"; then
        printf "\nconfig CPU_FREQ_GOV_VORPAL\n" >> "$TARGET_DIR/drivers/cpufreq/Kconfig"
        printf "\ttristate \"'vorpal' cpufreq governor\"\n" >> "$TARGET_DIR/drivers/cpufreq/Kconfig"
        printf "\tdepends on CPU_FREQ && SMP\n" >> "$TARGET_DIR/drivers/cpufreq/Kconfig"
        printf "\tselect CPU_FREQ_GOV_ATTR_SET\n" >> "$TARGET_DIR/drivers/cpufreq/Kconfig"
        printf "\thelp\n" >> "$TARGET_DIR/drivers/cpufreq/Kconfig"
        printf "\t  'vorpal' is a schedutil-based governor tuned for\n" >> "$TARGET_DIR/drivers/cpufreq/Kconfig"
        printf "\t  gaming/thermal-aware dual-profile operation.\n" >> "$TARGET_DIR/drivers/cpufreq/Kconfig"
      fi

      DEFCONFIG_GKI="$TARGET_DIR/arch/arm64/configs/gki_defconfig"
      if [ -f "$DEFCONFIG_GKI" ] && ! grep -q "CONFIG_CPU_FREQ_GOV_VORPAL" "$DEFCONFIG_GKI"; then
        echo "CONFIG_CPU_FREQ_GOV_VORPAL=y" >> "$DEFCONFIG_GKI"
      fi

  - name: 'Fix Vorpal Input-Handler Init Bug'
    shell: bash
    working-directory: ${{ github.workspace }}/kernel/common
    run: |
      set -euo pipefail
      VORPAL_C="kernel/sched/cpufreq_vorpal.c"

      # vorpal_gov_init() unconditionally calls
      # input_unregister_handler() in the cpufreq_register_governor()
      # failure path, even when input_register_handler() itself had
      # already failed earlier (only pr_warn'd, never tracked). If
      # both registrations fail on module load, that unregisters a
      # handler that was never actually linked into the input core's
      # list -- list corruption / crash. Track success explicitly and
      # only unregister what was actually registered.

      if ! grep -q "bool input_ok;" "$VORPAL_C"; then
        perl -0pi -e 's{(static int __init vorpal_gov_init\(void\)\n\{\n\tint ret;\n)}{$1\tbool input_ok;\n}' "$VORPAL_C"
      fi

      if ! grep -q "input_ok = !input_register_handler" "$VORPAL_C"; then
        perl -0pi -e 's{\tif \(input_register_handler\(&rfx_input_handler\)\)\n\t\tpr_warn\("vorpal: input handler register failed \(touch boost off\)\\n"\);}{\tinput_ok = !input_register_handler(&rfx_input_handler);\n\tif (!input_ok)\n\t\tpr_warn("vorpal: input handler register failed (touch boost off)\\n");}' "$VORPAL_C"
      fi

      if ! grep -q "if (input_ok)" "$VORPAL_C"; then
        perl -0pi -e 's{\tret = cpufreq_register_governor\(&vorpal_gov\);\n\tif \(ret\) \{\n\t\tinput_unregister_handler\(&rfx_input_handler\);\n\t\tcancel_delayed_work_sync\(&rfx_thermal_work\);\n\t\}}{\tret = cpufreq_register_governor(&vorpal_gov);\n\tif (ret) \{\n\t\tif (input_ok)\n\t\t\tinput_unregister_handler(&rfx_input_handler);\n\t\tcancel_delayed_work_sync(&rfx_thermal_work);\n\t\}}' "$VORPAL_C"
      fi

      # Sanity check, fail loudly here rather than silently no-op'ing
      # if vorpal.c's source drifted from the anchors above.
      if ! grep -q "bool input_ok;" "$VORPAL_C"; then
        echo "ERROR: failed to inject 'bool input_ok;' into vorpal_gov_init()" >&2
        exit 1
      fi
      if ! grep -q "input_ok = !input_register_handler" "$VORPAL_C"; then
        echo "ERROR: failed to patch input_register_handler() call in vorpal_gov_init()" >&2
        exit 1
      fi
      if ! grep -q "if (input_ok)" "$VORPAL_C"; then
        echo "ERROR: failed to guard input_unregister_handler() in vorpal_gov_init() error path" >&2
        exit 1
      fi

  - name: 'Inject Vorpal Gaming-Mode Bias into fair.c'
    shell: bash
    working-directory: ${{ github.workspace }}/kernel/common
    run: |
      set -euo pipefail
      FAIR_C="kernel/sched/fair.c"

      # sched_gaming_active is defined+exported by rfx_gki510_compat.c
      # (step above). Declare it + the vruntime-stretch constant here.
      # Anchored right after sysctl_sched_latency's own definition
      # block, a stable, always-present line in vanilla CFS.
      if ! grep -q "extern int sched_gaming_active;" "$FAIR_C"; then
        perl -0pi -e 's{(static unsigned int normalized_sysctl_sched_latency\s*=\s*6000000ULL;)}{$1\n\n/*\n * Vorpal gaming coupling. File-scope global (KMI-safe: not a\n * task_struct/sched_entity field), written by the Vorpal governor'"'"'s\n * gaming_mode knob, read here to bias CFS behaviour during sustained\n * gaming. 0 == normal CFS behaviour.\n */\nextern int sched_gaming_active;\n\n#define GAMING_VRUNTIME_STRETCH\t\t4\n}' "$FAIR_C"
      fi

      # 1) update_curr(): stretch vruntime for background (non-task /
      # light-load) entities while gaming, so foreground work keeps
      # more of the CPU.
      if ! grep -q "GAMING_VRUNTIME_STRETCH - 1" "$FAIR_C"; then
        perl -0pi -e 's{(\tcurr->vruntime \+= calc_delta_fair\(delta_exec, curr\);\n)(\tupdate_min_vruntime\(cfs_rq\);\n)}{$1\n\t/* Gaming mode: stretch vruntime for background tasks */\n\tif (unlikely(sched_gaming_active \&\& !entity_is_task(curr))) {\n\t\tcurr->vruntime += calc_delta_fair(delta_exec * (GAMING_VRUNTIME_STRETCH - 1), curr);\n\t} else if (unlikely(sched_gaming_active \&\& entity_is_task(curr) \&\&\n\t\t\t     curr->avg.load_avg < 100)) {\n\t\tcurr->vruntime += calc_delta_fair(delta_exec, curr);\n\t}\n$2}' "$FAIR_C"
      fi

      # 2) check_preempt_tick(): reduce ideal runtime for background
      # (nice > 0) tasks while gaming, so they yield to foreground work
      # sooner. entity_is_task() guard added on top of the original
      # design -- task_of() on a cgroup group entity would be unsafe.
      if ! grep -q "Gaming mode: reduce ideal runtime" "$FAIR_C"; then
        perl -0pi -e 's{(\tdelta_exec = curr->sum_exec_runtime - curr->prev_sum_exec_runtime;\n)(\ttrace_android_rvh_check_preempt_tick)}{$1\n\t/* Gaming mode: reduce ideal runtime for background tasks */\n\tif (unlikely(sched_gaming_active) \&\& entity_is_task(curr)) {\n\t\tstruct task_struct *p = task_of(curr);\n\n\t\tif (p->static_prio > DEFAULT_PRIO \&\&\n\t\t    delta_exec > ideal_runtime / 2)\n\t\t\tresched_curr(rq_of(cfs_rq));\n\t}\n\n$2}' "$FAIR_C"
      fi

      # 3) enqueue_task_fair(): nudge foreground (nice <= 0) tasks to
      # the front of the runqueue on wakeup for lower schedule latency.
      if ! grep -q "Gaming mode: nudge foreground" "$FAIR_C"; then
        perl -0pi -e 's{(\tfor_each_sched_entity\(se\) \{\n\t\tcfs_rq = cfs_rq_of\(se\);\n\n)(\t\tupdate_load_avg\(cfs_rq, se, UPDATE_TG\);\n\t\tse_update_runnable\(se\);\n\t\tupdate_cfs_group\(se\);)}{$1\t\t/* Gaming mode: nudge foreground (top-app) tasks to the front\n\t\t * of the runqueue so render / game-logic threads schedule with\n\t\t * less wakeup latency. Foreground approximated by nice <= 0\n\t\t * (static_prio <= DEFAULT_PRIO). Reads only, no struct change.\n\t\t */\n\t\tif (unlikely(sched_gaming_active \&\& entity_is_task(se) \&\&\n\t\t\t     task_of(se)->static_prio <= DEFAULT_PRIO))\n\t\t\tse->vruntime -= min_t(u64, se->vruntime, NSEC_PER_MSEC);\n\n$2}' "$FAIR_C"
      fi

      # 4) task_hot(): keep heavy render/game threads off a
      # smaller-capacity (LITTLE) destination during the load balancer
      # migration decision; bias only, active balance can still move it.
      if ! grep -q "Gaming task isolation" "$FAIR_C"; then
        perl -0pi -e 's{(\tdelta = rq_clock_task\(env->src_rq\) - p->se\.exec_start;\n\n)(\treturn delta < \(s64\)sysctl_sched_migration_cost;\n\}\n)}{$1\t/* Gaming task isolation + anti-thrash. Keep heavy render/game\n\t * threads off a smaller-capacity destination (demoting to LITTLE\n\t * is a common frame-drop source); light tasks stay migratable.\n\t * Bias only, not a hard pin -- active balance can still move it.\n\t */\n\tif (sched_gaming_active) {\n\t\tif (capacity_orig_of(env->dst_cpu) < capacity_orig_of(env->src_cpu) \&\&\n\t\t    task_util(p) > (capacity_orig_of(env->src_cpu) >> 3))\n\t\t\treturn 1;\n\t\treturn delta < (s64)sysctl_sched_migration_cost * 2;\n\t}\n\n$2}' "$FAIR_C"
      fi

      # Sanity check: fail loudly here instead of deep in the compile
      # log if any anchor above didn't match (source drifted from
      # what this patch expects).
      for MARK in "extern int sched_gaming_active;" "GAMING_VRUNTIME_STRETCH - 1" "Gaming mode: reduce ideal runtime" "Gaming mode: nudge foreground" "Gaming task isolation"; do
        if ! grep -qF "$MARK" "$FAIR_C"; then
          echo "ERROR: failed to inject fair.c gaming patch, missing marker: $MARK" >&2
          exit 1
        fi
      done

  - name: 'Inject Dynamic Fsync'
    shell: bash
    run: |
      set -euo pipefail
      TARGET_DIR="$GITHUB_WORKSPACE/kernel/common"

      # Header
      mkdir -p "$TARGET_DIR/include/linux"
      cp "${{ github.action_path }}/patches/dynamic_fsync/dynamic_fsync.h" \
         "$TARGET_DIR/include/linux/dynamic_fsync.h"

      # sync.c -- full file replace. This file is not touched by any
      # other step in this pipeline, so a straight copy is safe (no
      # anchor-based perl patching needed like fair.c/vorpal.c above).
      cp "${{ github.action_path }}/patches/dynamic_fsync/sync.c" \
         "$TARGET_DIR/fs/sync.c"

      # Standalone driver module (backlight-notifier based screen-state
      # detection -- writes dynamic_fsync_state, which fs/sync.c reads).
      mkdir -p "$TARGET_DIR/drivers/dynamic_fsync"
      cp "${{ github.action_path }}/patches/dynamic_fsync/dynamic_fsync_driver.c" \
         "$TARGET_DIR/drivers/dynamic_fsync/dynamic_fsync_driver.c"
      cp "${{ github.action_path }}/patches/dynamic_fsync/Makefile" \
         "$TARGET_DIR/drivers/dynamic_fsync/Makefile"
      if ! grep -q "dynamic_fsync/" "$TARGET_DIR/drivers/Makefile"; then
        echo "obj-y += dynamic_fsync/" >> "$TARGET_DIR/drivers/Makefile"
      fi

      # Defconfig fix: CONFIG_DYNAMIC_FSYNC must be y, otherwise
      # dynamic_fsync_state/dynamic_fsync_enabled are never defined in
      # sync.c (they're guarded by #ifdef CONFIG_DYNAMIC_FSYNC there),
      # and the driver module above will fail to link against them.
      DEFCONFIG_GKI="$TARGET_DIR/arch/arm64/configs/gki_defconfig"
      if [ -f "$DEFCONFIG_GKI" ] && ! grep -q "CONFIG_DYNAMIC_FSYNC" "$DEFCONFIG_GKI"; then
        echo "CONFIG_DYNAMIC_FSYNC=y" >> "$DEFCONFIG_GKI"
      fi

      # Sanity check: fail loudly here instead of deep in the compile
      # log if the copy silently didn't land where expected.
      if ! grep -q "dynamic_fsync_should_skip" "$TARGET_DIR/fs/sync.c"; then
        echo "ERROR: dynamic_fsync hook missing from fs/sync.c after copy" >&2
        exit 1
      fi
      if ! grep -q "CONFIG_DYNAMIC_FSYNC" "$DEFCONFIG_GKI" 2>/dev/null; then
        echo "ERROR: CONFIG_DYNAMIC_FSYNC missing from gki_defconfig after patch" >&2
        exit 1
      fi

  - name: 'Build Kernel'
    shell: bash
    working-directory: ${{ github.workspace }}/kernel
    run: |
      sed -i 's/check_defconfig//' ./common/build.config.gki
      if [ -f "build/build.sh" ]; then
        BUILD_GKI_ARTIFACTS= \
        BUILD_GKI_CERTIFICATION_TOOLS=0 \
        BUILD_SYSTEM_DLKM=0 \
        SKIP_VENDOR_BOOT=1 \
        SKIP_EXT_MODULES=1 \
        SKIP_CP_KERNEL_HDR=1 \
        OUT_DIR="/home/runner/out" \
        LTO=thin \
        BUILD_CONFIG=common/build.config.gki.aarch64 \
        build/build.sh -j"$(nproc)" \
        CC="/usr/bin/ccache clang" \
        CXX="/usr/bin/ccache clang+" \
        HOSTCC="/usr/bin/ccache clang" \
        HOSTCXX="/usr/bin/ccache clang+" \
        LD="${{ github.workspace }}/kernel/common/ld-wrapper" \
        HOSTLD="${{ github.workspace }}/kernel/common/ld-wrapper"
      else
        if [[ ${{ inputs.version }} == "android16-6.12" ]]; then
          if [ "${{ inputs.bypass }}" = "false" ]; then
            sed -i '/name = "kernel_aarch64",/a\    check_defconfig = "disabled",' common/BUILD.bazel
          fi
          tools/bazel run \
            --config=fast \
            --config=stamp \
            --disk_cache=/home/runner/.cache/bazel \
            //common:kernel_aarch64_dist \
            -- --destdir=/home/runner/out
        else
          tools/bazel run \
            --config=fast \
            --config=stamp \
            --disk_cache=/home/runner/.cache/bazel \
            //common:kernel_aarch64_dist \
            -- --dist_dir=/home/runner/out
        fi
      fi

  - name: 'Gather Build Artifacts'
    shell: bash
    working-directory: ${{ github.workspace }}
    run: |
      set -euo pipefail
      if [ -f "/home/runner/out/dist/Image" ]; then
        if [[ ${{ inputs.bypass }} == "true" ]]; then
          cp "/home/runner/out/dist/Image" "${{ github.workspace }}/AnyKernel3/Bypass-Image"
        else
          cp "/home/runner/out/dist/Image" "${{ github.workspace }}/AnyKernel3/Image"
        fi
        exit 0
      fi
      if [ -f "/home/runner/out/Image" ]; then
        if [[ ${{ inputs.bypass }} == "true" ]]; then
          cp "/home/runner/out/Image" "${{ github.workspace }}/AnyKernel3/Bypass-Image"
        else
          cp "/home/runner/out/Image" "${{ github.workspace }}/AnyKernel3/Image"
        fi
        exit 0
      fi
      exit 1

  - name: 'Patch AnyKernel3 for Bypass Hack'
    shell: bash
    if: ${{ inputs.bypass == 'true' }}
    working-directory: ${{ github.workspace }}/AnyKernel3
    run: |
      set -euo pipefail
      cp ${{ github.action_path }}/patches/bypass.patch "${{ github.workspace }}/AnyKernel3/bypass.patch"
      patch -p1 < bypass.patch
