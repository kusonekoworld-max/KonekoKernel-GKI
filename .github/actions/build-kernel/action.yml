name: 'Build Kernel'
description: 'Builds kernel using legacy build.sh or Bazel (kleaf)'
inputs:
  bypass:
    description: 'Whether to add the bypass hack or not'
    required: true
  version:
    description: 'Kernel config version (e.g., android14-6.1)'
    required: true

runs:
  using: composite
  steps:
  - name: 'Activate Bypass'
    shell: bash
    working-directory: ${{ github.workspace }}/kernel
    run: |
      set -euo pipefail
      if [ "${{ inputs.bypass }}" = "true" ]; then
        if [[ ${{ inputs.version }} == "android14-6.1" || ${{ inputs.version }} == "android15-6.6" || ${{ inputs.version }} == "android16-6.12" ]]; then
          TARGET_FILE="${{ github.workspace }}/kernel/common/kernel/module/version.c"
        else
          TARGET_FILE="${{ github.workspace }}/kernel/common/kernel/module.c"
        fi

        sed -i '/bad_version:/{:a;n;/return 0;/{s/return 0;/return 1;/;b};ba}' "$TARGET_FILE"

        if ! grep -A 5 "bad_version:" "$TARGET_FILE" | grep -q "return 1;"; then
          echo "Patch failed! 'return 1;' not found at bad_version:"
          grep -A 10 "bad_version:" "$TARGET_FILE" || true
          exit 1
        fi
      else
        echo "Bypass hack not applied as per input parameter."
      fi

  - name: Setup Kernel Configs
    if: false
    uses: ./.github/actions/set-kernel-config

  - name: 'Debug - List Beatrice Patch Files'
    shell: bash
    run: |
      echo "=== Beatrice folder contents ==="
      ls -la "${{ github.action_path }}/patches/beatrice/" || echo "FOLDER NOT FOUND"

  - name: 'Inject Beatrice Sysfs Driver'
    shell: bash
    working-directory: ${{ github.workspace }}/kernel/common
    run: |
      set -euo pipefail

      echo "=== Injecting Beatrice module ==="
      mkdir -p drivers/beatrice

      # Clean up the './' segments in the action path that cause glitches
      RAW_PATH="${{ github.action_path }}"
      CLEAN_ACTION_PATH=$(echo "$RAW_PATH" | sed 's|/\./|/|g' | sed 's|^\./||')

      # If the path is still relative, make it absolute from workspace
      if [[ "$CLEAN_ACTION_PATH" == .github* ]]; then
        CLEAN_ACTION_PATH="$GITHUB_WORKSPACE/$CLEAN_ACTION_PATH"
      fi

      echo "Valid patches folder path: $CLEAN_ACTION_PATH/patches"

      # Copy using the cleaned path
      cp "$CLEAN_ACTION_PATH/patches/beatrice/beatrice_core.c" drivers/beatrice/beatrice_core.c

      MAKEFILE_SRC=$(find "$CLEAN_ACTION_PATH/patches/beatrice/" -iname "makefile" | head -1)
      if [ -z "$MAKEFILE_SRC" ]; then
        echo "ERROR: Makefile/makefile not found in beatrice folder"
        ls -la "$CLEAN_ACTION_PATH/patches/beatrice/"
        exit 1
      fi
      cp "$MAKEFILE_SRC" drivers/beatrice/Makefile

      # Register with the main kernel drivers Makefile
      if ! grep -q "beatrice/" drivers/Makefile; then
        echo "obj-y += beatrice/" >> drivers/Makefile
      fi

      echo "✅ Beatrice driver injected successfully!"

  - name: 'Debug - List Tenebrion Patch Files'
    shell: bash
    run: |
      echo "=== Tenebrion folder contents ==="
      ls -la "${{ github.action_path }}/patches/tenebrion/" || echo "FOLDER NOT FOUND"

  - name: 'Inject Tenebrion CPU/Cpuset Driver'
    shell: bash
    working-directory: ${{ github.workspace }}/kernel/common
    run: |
      set -euo pipefail

      echo "=== Injecting Tenebrion module ==="
      mkdir -p drivers/tenebrion

      RAW_PATH="${{ github.action_path }}"
      CLEAN_ACTION_PATH=$(echo "$RAW_PATH" | sed 's|/\./|/|g' | sed 's|^\./||')

      if [[ "$CLEAN_ACTION_PATH" == .github* ]]; then
        CLEAN_ACTION_PATH="$GITHUB_WORKSPACE/$CLEAN_ACTION_PATH"
      fi

      echo "Valid patches folder path: $CLEAN_ACTION_PATH/patches/tenebrion"

      TENEBRION_SRC="$CLEAN_ACTION_PATH/patches/tenebrion/tenebrion.c"
      if [ ! -f "$TENEBRION_SRC" ]; then
        echo "ERROR: tenebrion.c not found at $TENEBRION_SRC"
        ls -la "$CLEAN_ACTION_PATH/patches/tenebrion/" || true
        exit 1
      fi
      cp "$TENEBRION_SRC" drivers/tenebrion/tenebrion.c

      MAKEFILE_SRC=$(find "$CLEAN_ACTION_PATH/patches/tenebrion/" -iname "makefile" | head -1)
      if [ -z "$MAKEFILE_SRC" ]; then
        echo "ERROR: Makefile/makefile not found in tenebrion folder"
        ls -la "$CLEAN_ACTION_PATH/patches/tenebrion/"
        exit 1
      fi
      cp "$MAKEFILE_SRC" drivers/tenebrion/Makefile

      if ! grep -q "tenebrion/" drivers/Makefile; then
        echo "obj-y += tenebrion/" >> drivers/Makefile
      fi

      echo "✅ Tenebrion driver injected successfully!"

  - name: 'Inject Tenebrion SELinux Rules'
    shell: bash
    working-directory: ${{ github.workspace }}/kernel/common
    run: |
      set -euo pipefail

      RAW_PATH="${{ github.action_path }}"
      CLEAN_ACTION_PATH=$(echo "$RAW_PATH" | sed 's|/\./|/|g' | sed 's|^\./||')
      if [[ "$CLEAN_ACTION_PATH" == .github* ]]; then
        CLEAN_ACTION_PATH="$GITHUB_WORKSPACE/$CLEAN_ACTION_PATH"
      fi

      SELINUX_SCRIPT_SRC="$CLEAN_ACTION_PATH/patches/tenebrion/selinux.sh"
      if [ ! -f "$SELINUX_SCRIPT_SRC" ]; then
        echo "ERROR: selinux.sh not found at $SELINUX_SCRIPT_SRC"
        ls -la "$CLEAN_ACTION_PATH/patches/tenebrion/" || true
        exit 1
      fi
      cp "$SELINUX_SCRIPT_SRC" ./selinux.sh
      chmod +x ./selinux.sh

      echo "=== Searching for KernelSU-Next rules.c ==="
      RULES_FILE=$(find . -path "*kernelsu*" -iname "rules.c" 2>/dev/null | head -1)

      if [[ -z "$RULES_FILE" ]]; then
        echo "❌ rules.c not found in this KernelSU-Next source tree."
        echo "Directory structure related to kernelsu/ksu:"
        find . -iname "*kernelsu*" -o -iname "*ksu*" 2>/dev/null | grep -v "\.git" || true
        exit 1
      fi
      echo "✅ Found: $RULES_FILE"

      if ! grep -qF 'rcu_assign_pointer(selinux_state.policy, pol);' "$RULES_FILE"; then
        echo "❌ Marker line not found in $RULES_FILE"
        cat "$RULES_FILE"
        exit 1
      fi
      if ! grep -q "ksu_allow" "$RULES_FILE"; then
        echo "❌ ksu_allow function not found in $RULES_FILE"
        exit 1
      fi

      export SELINUX_RULES_C="$RULES_FILE"
      ./selinux.sh

      echo "✅ Tenebrion SELinux rules injected successfully"
      grep -B2 -A35 "sysfs_leds" "$RULES_FILE" | head -40

  - name: 'Build Kernel'
    shell: bash
    working-directory: ${{ github.workspace }}/kernel
    run: |
      cat common/arch/arm64/configs/gki_defconfig
      sed -i 's/check_defconfig//' ./common/build.config.gki
      if [ -f "build/build.sh" ]; then
        BUILD_GKI_ARTIFACTS= \
        BUILD_GKI_CERTIFICATION_TOOLS=0 \
        BUILD_SYSTEM_DLKM=0 \
        SKIP_VENDOR_BOOT=1 \
        SKIP_EXT_MODULES=1 \
        SKIP_CP_KERNEL_HDR=1 \
        OUT_DIR="/home/runner/out" \
        LTO=thin \
        BUILD_CONFIG=common/build.config.gki.aarch64 \
        build/build.sh -j"$(nproc)" \
        CC="/usr/bin/ccache clang" \
        CXX="/usr/bin/ccache clang+" \
        HOSTCC="/usr/bin/ccache clang" \
        HOSTCXX="/usr/bin/ccache clang+" \
        LD="${{ github.workspace }}/kernel/common/ld-wrapper" \
        HOSTLD="${{ github.workspace }}/kernel/common/ld-wrapper"
      else
        if [[ ${{ inputs.version }} == "android16-6.12" ]]; then
          if [ "${{ inputs.bypass }}" = "false" ]; then
            sed -i '/name = "kernel_aarch64",/a\    check_defconfig = "disabled",' common/BUILD.bazel
          fi
          tools/bazel run \
            --config=fast \
            --config=stamp \
            --disk_cache=/home/runner/.cache/bazel \
            //common:kernel_aarch64_dist \
            -- --destdir=/home/runner/out
        else
          tools/bazel run \
            --config=fast \
            --config=stamp \
            --disk_cache=/home/runner/.cache/bazel \
            //common:kernel_aarch64_dist \
            -- --dist_dir=/home/runner/out
        fi
      fi

      cat /home/runner/out/common/.config || true

  - name: 'Gather Build Artifacts'
    shell: bash
    working-directory: ${{ github.workspace }}
    run: |
      set -euo pipefail
      if [ -f "/home/runner/out/dist/Image" ]; then
        echo "Found Image at /home/runner/out/dist/Image"
        if [[ ${{ inputs.bypass }} == "true" ]]; then
          cp "/home/runner/out/dist/Image" "${{ github.workspace }}/AnyKernel3/Bypass-Image"
        else
          cp "/home/runner/out/dist/Image" "${{ github.workspace }}/AnyKernel3/Image"
          echo "Kernel Version:"
          strings "/home/runner/out/dist/Image" | grep -m1 "^Linux version "
        fi
          exit 0
        fi
      if [ -f "/home/runner/out/Image" ]; then
        echo "Found Image at /home/runner/out/Image"
        if [[ ${{ inputs.bypass }} == "true" ]]; then
          cp "/home/runner/out/Image" "${{ github.workspace }}/AnyKernel3/Bypass-Image"
        else
          cp "/home/runner/out/Image" "${{ github.workspace }}/AnyKernel3/Image"
        fi
        exit 0
      fi

      exit 1

  - name: 'Patch AnyKernel3 for Bypass Hack'
    shell: bash
    if: ${{ inputs.bypass == 'true' }}
    working-directory: ${{ github.workspace }}/AnyKernel3
    run: |
      set -euo pipefail
      cp ${{ github.action_path }}/patches/bypass.patch "${{ github.workspace }}/AnyKernel3/bypass.patch"
      patch -p1 < bypass.patch