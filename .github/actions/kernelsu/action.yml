name: Setup KOWSU
description: Download and configure KOWSU (KOWX712/KernelSU) directly into GKI tree
inputs:
  ksu_branch:
    description: 'KOWSU branch, tag, or commit (empty = master)'
    required: false
    default: "master"

runs:
  using: composite
  steps:
    - name: Download and Configure KOWSU
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        set -euo pipefail

        KSU_INPUT="${{ inputs.ksu_branch }}"
        if [ -z "$KSU_INPUT" ]; then
          KSU_INPUT="master"
        fi

        echo "Using KOWSU ref: $KSU_INPUT"
        
        rm -rf KernelSU
        git clone https://github.com/KOWX712/KernelSU.git KernelSU
        cd KernelSU
        git checkout "$KSU_INPUT"
        cd ..

        TARGET_DIR="$GITHUB_WORKSPACE/kernel/common"

        echo "[+] Linking KOWSU to GKI Tree at $TARGET_DIR..."
        
        ln -sf "$GITHUB_WORKSPACE/kernel/KernelSU/kernel" "$TARGET_DIR/drivers/kernelsu"

        if ! grep -q "obj-y += kernelsu/" "$TARGET_DIR/drivers/Makefile"; then
          echo "obj-y += kernelsu/" >> "$TARGET_DIR/drivers/Makefile"
          echo "[+] Successfully registered KOWSU to drivers/Makefile"
        fi

        if ! grep -q "source \"drivers/kernelsu/Kconfig\"" "$TARGET_DIR/drivers/Kconfig"; then
          echo 'source "drivers/kernelsu/Kconfig"' >> "$TARGET_DIR/drivers/Kconfig"
          echo "[+] Successfully registered KOWSU to drivers/Kconfig"
        fi

        cd KernelSU/kernel
        COMMITS_COUNT=$(/usr/bin/git rev-list --count HEAD)
        BASE_VERSION=30000
        KSU_VERSION=$(expr $COMMITS_COUNT "+" $BASE_VERSION)
        sed -i "s/^KSU_VERSION_FALLBACK := 1$/KSU_VERSION_FALLBACK := ${KSU_VERSION}/" Kbuild

        KSU_GIT_TAG="$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.1")"
        sed -i "s/^KSU_VERSION_TAG_FALLBACK := v0.0.1$/KSU_VERSION_TAG_FALLBACK := ${KSU_GIT_TAG}/" Kbuild

        DEFCONFIG_GKI="$TARGET_DIR/arch/arm64/configs/gki_defconfig"
        if [ -f "$DEFCONFIG_GKI" ]; then
          if ! grep -q "CONFIG_KSU" "$DEFCONFIG_GKI"; then
            echo "" >> "$DEFCONFIG_GKI"
            echo "CONFIG_KSU=y" >> "$DEFCONFIG_GKI"
            echo "[+] Successfully injected CONFIG_KSU=y to gki_defconfig"
          fi
        fi

    - name: Extract KSU Version Info
      id: ksu-version
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/KernelSU
      run: |
        KSU_GIT_VERSION=$(git rev-list --count HEAD 2>/dev/null)
        KSU_GIT_TAG=$(git describe --tags --abbrev=0 HEAD 2>/dev/null || echo "")
        KSU_COMMIT=$(git rev-parse --short HEAD 2>/dev/null)
        KSU_VERSION=$((30000 + KSU_GIT_VERSION))

        echo "KSU_GIT_TAG=$KSU_GIT_TAG" >> $GITHUB_ENV
        echo "KSU_VERSION=$KSU_VERSION" >> $GITHUB_ENV
        echo "KSU_COMMIT=$KSU_COMMIT" >> $GITHUB_ENV

    - name: 'Fix KOWSU'
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/KernelSU
      run: |
        set -euo pipefail
        if [ -f "${{ github.action_path }}/patches/static.patch" ]; then
          cp ${{ github.action_path }}/patches/static.patch "${{ github.workspace }}/kernel/KernelSU/static.patch"
          patch -p1 < static.patch || echo "[!] Patch skipped or already applied"
        fi

    - name: Enable Kernel Configs
      uses: ./.github/actions/set-kernel-config
      with:
        config_list: |
          CONFIG_KSU=y
